name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chat_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # pnpm 11+ は Node.js 22.13+ を要求するため、Node 20 / lockfileVersion 9.0 と
          # 整合する pnpm 10 系に固定する（`latest` は破壊的に上がるため使用しない）
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: front
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: front
        run: pnpm exec playwright install --with-deps chromium

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Setup Ollama
        run: |
          # install.sh は常に最新版を入れるが、新しい Ollama は CPU 推論で
          # qwen2.5:0.5b が segfault（llama-server core dumped）し /api/chat が 5xx を返す。
          # 最後に CI が通った 2026-06-10 時点の最新である 0.30.7 に固定する。
          # 経緯は docs/08-ci-e2e-bug-report.md #13 参照。`latest` は破壊的に上がるため使わない。
          curl -fsSL https://ollama.com/install.sh | OLLAMA_VERSION=0.30.7 sh
          ollama serve &
          sleep 5
          ollama pull qwen2.5:0.5b

      - name: Run Prisma migrations
        working-directory: front
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chat_db
        run: pnpm prisma migrate deploy

      - name: Generate Prisma client
        working-directory: front
        run: pnpm prisma generate

      - name: Build Next.js
        working-directory: front
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chat_db
        run: pnpm build

      - name: Run E2E tests
        working-directory: front
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chat_db
          OLLAMA_BASE_URL: http://localhost:11434
          OLLAMA_MODEL: qwen2.5:0.5b
          CI: true
        run: pnpm test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: front/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: front/test-results/
          retention-days: 30
